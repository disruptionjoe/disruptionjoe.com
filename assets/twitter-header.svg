<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap');
    </style>
    <radialGradient id="glow" cx="42%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#d4bc94" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d4bc94" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edgeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4bc94" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4bc94" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4bc94" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4bc94" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4bc94" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d4bc94" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#d4bc94" stroke-opacity="0.035" stroke-width="0.5"/>
    </pattern>
    <mask id="gridMask">
      <radialGradient id="gridFade" cx="50%" cy="50%" r="50%">
        <stop offset="20%" stop-color="white"/>
        <stop offset="70%" stop-color="black"/>
      </radialGradient>
      <rect width="1500" height="500" fill="url(#gridFade)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#0a0a0a"/>

  <!-- Grid texture -->
  <rect width="1500" height="500" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Warm glow -->
  <rect width="1500" height="500" fill="url(#glow)"/>

  <!-- Top edge line -->
  <rect x="0" y="0" width="1500" height="1" fill="url(#topLine)"/>

  <!-- Kicker: top right -->
  <text x="1420" y="44" font-family="'Space Mono', monospace" font-size="10" font-weight="700" fill="#d4bc94" fill-opacity="0.4" text-anchor="end" letter-spacing="2">AI ACTIVATIONS PLAYBOOK</text>

  <!-- Name -->
  <text x="80" y="228" font-family="'Space Grotesk', sans-serif" font-size="58" font-weight="700" fill="#f5f5f5" letter-spacing="-1.5">Disruption Joe</text>

  <!-- Accent bar -->
  <rect x="80" y="248" width="48" height="3" rx="1.5" fill="#d4bc94"/>

  <!-- Tagline -->
  <text x="80" y="284" font-family="'Space Grotesk', sans-serif" font-size="17" font-weight="500" fill="#888">Facilitated AI sessions that produce</text>
  <text x="80" y="308" font-family="'Space Grotesk', sans-serif" font-size="17" font-weight="500" fill="#888">real outputs, not just energy.</text>

  <!-- System badges -->
  <!-- Arcs badge -->
  <rect x="920" y="168" width="110" height="52" rx="6" fill="#d4bc94" fill-opacity="0.04" stroke="#d4bc94" stroke-opacity="0.2"/>
  <text x="950" y="200" font-family="'Space Mono', monospace" font-size="22" font-weight="700" fill="#f5f5f5">8</text>
  <text x="974" y="200" font-family="'Space Mono', monospace" font-size="10" fill="#666" letter-spacing="1">ARCS</text>

  <!-- Plays badge -->
  <rect x="1045" y="168" width="120" height="52" rx="6" fill="#d4bc94" fill-opacity="0.04" stroke="#d4bc94" stroke-opacity="0.2"/>
  <text x="1071" y="200" font-family="'Space Mono', monospace" font-size="22" font-weight="700" fill="#f5f5f5">30</text>
  <text x="1104" y="200" font-family="'Space Mono', monospace" font-size="10" fill="#666" letter-spacing="1">PLAYS</text>

  <!-- Moves badge -->
  <rect x="1180" y="168" width="126" height="52" rx="6" fill="#d4bc94" fill-opacity="0.04" stroke="#d4bc94" stroke-opacity="0.2"/>
  <text x="1206" y="200" font-family="'Space Mono', monospace" font-size="22" font-weight="700" fill="#f5f5f5">31</text>
  <text x="1239" y="200" font-family="'Space Mono', monospace" font-size="10" fill="#666" letter-spacing="1">MOVES</text>

  <!-- Arc chips row 1 -->
  <rect x="978" y="238" width="195" height="30" rx="0" fill="#f5f5f5" fill-opacity="0.02" stroke="#d4bc94" stroke-opacity="0.3"/>
  <text x="990" y="258" font-family="'Space Mono', monospace" font-size="11" fill="#d4bc94">Friction to Opportunity</text>

  <rect x="1183" y="238" width="222" height="30" rx="0" fill="#f5f5f5" fill-opacity="0.02" stroke="#f5f5f5" stroke-opacity="0.06"/>
  <text x="1195" y="258" font-family="'Space Mono', monospace" font-size="11" fill="#555">Concern to Confidence</text>

  <!-- Arc chips row 2 -->
  <rect x="978" y="276" width="240" height="30" rx="0" fill="#f5f5f5" fill-opacity="0.02" stroke="#f5f5f5" stroke-opacity="0.06"/>
  <text x="990" y="296" font-family="'Space Mono', monospace" font-size="11" fill="#555">Exploration to Commitment</text>

  <rect x="1228" y="276" width="210" height="30" rx="0" fill="#f5f5f5" fill-opacity="0.02" stroke="#f5f5f5" stroke-opacity="0.06"/>
  <text x="1240" y="296" font-family="'Space Mono', monospace" font-size="11" fill="#555">Readiness to Activation</text>

  <!-- Bottom edge line -->
  <rect x="0" y="498" width="1500" height="2" fill="url(#edgeLine)"/>
</svg>
