<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: BANNER_WIDTH;
    height: BANNER_HEIGHT;
    background: #0a0a0a;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(212, 188, 148, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212, 188, 148, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 70% 80% at 50% 50%, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse 70% 80% at 50% 50%, black 20%, transparent 70%);
  }

  /* Warm glow behind the center */
  body::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 42%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(212, 188, 148, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 PADDING_H;
    gap: CONTENT_GAP;
  }

  .left {
    flex: 1;
  }

  .name {
    font-size: NAME_SIZE;
    font-weight: 700;
    color: #f5f5f5;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .tagline {
    margin-top: TAG_MARGIN;
    font-size: TAG_SIZE;
    font-weight: 500;
    color: #888;
    line-height: 1.4;
    max-width: 460px;
  }

  .accent-bar {
    margin-top: BAR_MARGIN;
    width: 48px;
    height: 3px;
    background: #d4bc94;
    border-radius: 2px;
  }

  .right {
    display: flex;
    flex-direction: column;
    gap: RIGHT_GAP;
    align-items: flex-end;
  }

  .system-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: BADGE_PAD;
    border: 1px solid rgba(212, 188, 148, 0.2);
    background: rgba(212, 188, 148, 0.04);
    border-radius: 6px;
  }

  .badge-count {
    font-family: 'Space Mono', monospace;
    font-size: COUNT_SIZE;
    font-weight: 700;
    color: #f5f5f5;
    line-height: 1;
  }

  .badge-label {
    font-family: 'Space Mono', monospace;
    font-size: LABEL_SIZE;
    color: #666;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .arc-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: flex-end;
    max-width: 420px;
  }

  .arc-chip {
    font-family: 'Space Mono', monospace;
    font-size: CHIP_SIZE;
    color: #555;
    padding: 5px 10px;
    border: 1px solid rgba(245, 245, 245, 0.06);
    background: rgba(245, 245, 245, 0.02);
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .arc-chip.highlight {
    border-color: rgba(212, 188, 148, 0.3);
    color: #d4bc94;
    background: rgba(212, 188, 148, 0.06);
  }

  /* Top-right kicker */
  .kicker {
    position: absolute;
    top: KICKER_TOP;
    right: PADDING_H;
    font-family: 'Space Mono', monospace;
    font-size: KICKER_SIZE;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #d4bc94;
    opacity: 0.4;
  }

  /* Bottom edge line */
  .edge-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(212, 188, 148, 0.3), transparent);
  }
</style>
</head>
<body>
  <div class="kicker">AI Activations Playbook</div>
  <div class="container">
    <div class="left">
      <div class="name">Disruption Joe</div>
      <div class="accent-bar"></div>
      <div class="tagline">Facilitated AI sessions that produce real outputs, not just energy.</div>
    </div>
    <div class="right">
      <div style="display: flex; gap: 10px;">
        <div class="system-badge">
          <div class="badge-count">8</div>
          <div class="badge-label">Arcs</div>
        </div>
        <div class="system-badge">
          <div class="badge-count">30</div>
          <div class="badge-label">Plays</div>
        </div>
        <div class="system-badge">
          <div class="badge-count">31</div>
          <div class="badge-label">Moves</div>
        </div>
      </div>
      <div class="arc-chips">
        <span class="arc-chip highlight">Friction to Opportunity</span>
        <span class="arc-chip">Concern to Confidence</span>
        <span class="arc-chip">Exploration to Commitment</span>
        <span class="arc-chip">Readiness to Activation</span>
      </div>
    </div>
  </div>
  <div class="edge-line"></div>
</body>
</html>
