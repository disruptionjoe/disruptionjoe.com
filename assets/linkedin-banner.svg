<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap');
    </style>
    <radialGradient id="glow" cx="40%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#d4bc94" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#d4bc94" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edgeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4bc94" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4bc94" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4bc94" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4bc94" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4bc94" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d4bc94" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#d4bc94" stroke-opacity="0.035" stroke-width="0.5"/>
    </pattern>
    <mask id="gridMask">
      <radialGradient id="gridFade" cx="50%" cy="50%" r="50%">
        <stop offset="20%" stop-color="white"/>
        <stop offset="70%" stop-color="black"/>
      </radialGradient>
      <rect width="1584" height="396" fill="url(#gridFade)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0a0a0a"/>

  <!-- Grid texture -->
  <rect width="1584" height="396" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Warm glow -->
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- Top edge line -->
  <rect x="0" y="0" width="1584" height="1" fill="url(#topLine)"/>

  <!-- Kicker: top right -->
  <text x="1504" y="38" font-family="'Space Mono', monospace" font-size="9" font-weight="700" fill="#d4bc94" fill-opacity="0.4" text-anchor="end" letter-spacing="1.8">AI ACTIVATIONS PLAYBOOK</text>

  <!-- Name -->
  <text x="80" y="182" font-family="'Space Grotesk', sans-serif" font-size="50" font-weight="700" fill="#f5f5f5" letter-spacing="-1.3">Disruption Joe</text>

  <!-- Accent bar -->
  <rect x="80" y="198" width="44" height="3" rx="1.5" fill="#d4bc94"/>

  <!-- Tagline -->
  <text x="80" y="230" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="500" fill="#888">Facilitated AI sessions that produce real outputs, not just energy.</text>

  <!-- System badges -->
  <rect x="980" y="130" width="100" height="46" rx="6" fill="#d4bc94" fill-opacity="0.04" stroke="#d4bc94" stroke-opacity="0.2"/>
  <text x="1006" y="158" font-family="'Space Mono', monospace" font-size="19" font-weight="700" fill="#f5f5f5">8</text>
  <text x="1026" y="158" font-family="'Space Mono', monospace" font-size="9" fill="#666" letter-spacing="1">ARCS</text>

  <rect x="1094" y="130" width="112" height="46" rx="6" fill="#d4bc94" fill-opacity="0.04" stroke="#d4bc94" stroke-opacity="0.2"/>
  <text x="1116" y="158" font-family="'Space Mono', monospace" font-size="19" font-weight="700" fill="#f5f5f5">30</text>
  <text x="1146" y="158" font-family="'Space Mono', monospace" font-size="9" fill="#666" letter-spacing="1">PLAYS</text>

  <rect x="1220" y="130" width="114" height="46" rx="6" fill="#d4bc94" fill-opacity="0.04" stroke="#d4bc94" stroke-opacity="0.2"/>
  <text x="1242" y="158" font-family="'Space Mono', monospace" font-size="19" font-weight="700" fill="#f5f5f5">31</text>
  <text x="1272" y="158" font-family="'Space Mono', monospace" font-size="9" fill="#666" letter-spacing="1">MOVES</text>

  <!-- Arc chips row 1 -->
  <rect x="1022" y="192" width="182" height="27" rx="0" fill="#f5f5f5" fill-opacity="0.02" stroke="#d4bc94" stroke-opacity="0.3"/>
  <text x="1033" y="210" font-family="'Space Mono', monospace" font-size="10" fill="#d4bc94">Friction to Opportunity</text>

  <rect x="1214" y="192" width="205" height="27" rx="0" fill="#f5f5f5" fill-opacity="0.02" stroke="#f5f5f5" stroke-opacity="0.06"/>
  <text x="1225" y="210" font-family="'Space Mono', monospace" font-size="10" fill="#555">Concern to Confidence</text>

  <!-- Arc chips row 2 -->
  <rect x="1022" y="226" width="225" height="27" rx="0" fill="#f5f5f5" fill-opacity="0.02" stroke="#f5f5f5" stroke-opacity="0.06"/>
  <text x="1033" y="244" font-family="'Space Mono', monospace" font-size="10" fill="#555">Exploration to Commitment</text>

  <rect x="1257" y="226" width="195" height="27" rx="0" fill="#f5f5f5" fill-opacity="0.02" stroke="#f5f5f5" stroke-opacity="0.06"/>
  <text x="1268" y="244" font-family="'Space Mono', monospace" font-size="10" fill="#555">Readiness to Activation</text>

  <!-- Bottom edge line -->
  <rect x="0" y="394" width="1584" height="2" fill="url(#edgeLine)"/>
</svg>
