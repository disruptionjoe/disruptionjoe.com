<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    :root {
      --black: #0a0a0a;
      --white: #f5f5f5;
      --gray: #8e8e8e;
      --gray-dim: #666;
      --border: #232323;
      --tan: #d4bc94;
    }

    body {
      width: 1200px;
      height: 630px;
      background: var(--black);
      color: var(--white);
      font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      position: relative;
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1200px;
      height: 420px;
      pointer-events: none;
      background: radial-gradient(ellipse 55% 75% at 50% 0%, rgba(212, 188, 148, 0.13), rgba(212, 188, 148, 0.03) 45%, transparent 70%);
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 3px 3px;
      opacity: 0.6;
      mix-blend-mode: overlay;
    }

    .top, .middle, .bottom {
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      font-family: "Space Mono", ui-monospace, monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--tan);
      display: inline-flex;
      align-items: center;
      gap: 18px;
    }

    .eyebrow::before {
      content: "";
      width: 44px;
      height: 1px;
      background: var(--tan);
      display: inline-block;
    }

    h1 {
      font-size: 96px;
      line-height: 0.98;
      letter-spacing: -0.045em;
      font-weight: 600;
      max-width: 16ch;
      margin-top: 36px;
    }

    h1 em {
      font-style: normal;
      color: var(--tan);
      font-weight: 600;
      white-space: nowrap;
    }

    .sub {
      font-size: 24px;
      line-height: 1.45;
      color: #c3c3c3;
      max-width: 36ch;
      margin-top: 28px;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-top: 1px solid var(--border);
      padding-top: 26px;
    }

    .meta {
      display: flex;
      gap: 40px;
    }

    .meta-item .label {
      font-family: "Space Mono", ui-monospace, monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gray-dim);
      margin-bottom: 6px;
    }

    .meta-item .value {
      font-size: 20px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.005em;
    }

    .url {
      font-family: "Space Mono", ui-monospace, monospace;
      font-size: 16px;
      color: var(--tan);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="eyebrow">Free Live Session &middot; April 30</div>
    <h1>Why so many AI pilots <em>stall out</em></h1>
    <p class="sub">A live proof session for team leaders, operators, and founders.</p>
  </div>

  <div class="bottom">
    <div class="meta">
      <div class="meta-item">
        <div class="label">When</div>
        <div class="value">Apr 30 &middot; 11:30 AM CT</div>
      </div>
      <div class="meta-item">
        <div class="label">Format</div>
        <div class="value">60 min &middot; Live on Zoom</div>
      </div>
      <div class="meta-item">
        <div class="label">Cost</div>
        <div class="value">Free</div>
      </div>
    </div>
    <div class="url">disruptionjoe.com/webinar</div>
  </div>
</body>
</html>
