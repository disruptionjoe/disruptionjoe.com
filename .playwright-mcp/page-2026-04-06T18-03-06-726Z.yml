            - paragraph [ref=e89]: David is a Quality Systems Manager at a 150-person engineering firm. He can see the shift coming, and he does not want to be the person who wakes up late to it. But he also cannot mess around with sensitive company information just because the internet is excited.
            - paragraph [ref=e90]: He wants to catch up quickly, understand the real boundaries, and start building real fluency in a way that is responsible, useful, and genuinely interesting to him.
            - heading "What unlock looks like for David" [level=4] [ref=e91]
            - paragraph [ref=e92]: 1. Speed him through the landscape of tools from major model features to privacy-preserving and open-source tools so he can catch up fast.
            - paragraph [ref=e93]: 2. Help him start a personal agent side project that scratches his creative engineering itch and is fun enough to inspire more learning.
            - paragraph [ref=e94]: 3. Show him how to turn that tinkering into practical credibility, so he becomes "the AI guy" at work.
