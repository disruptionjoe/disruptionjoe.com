            - paragraph [ref=e104]: Sandra is recently retired, but not exactly slowing down. She serves as treasurer for her retirement community's HOA. She helps organize events for a breast cancer charity that means a lot to her. She stays active in her church. And on top of that she tries to get in 9 holes of golf in every other morning. We haven't even mentioned the grandkids yet.
            - paragraph [ref=e105]: She can tell AI could be useful, maybe even fun, but every time she looks into it she runs into jargon, hype, and too many opinions. What she needs is not more noise. It is someone to make it simple, practical, and worth using in the parts of life that already matter to her.
            - heading "What unlock looks like for Sandra" [level=4] [ref=e106]
            - paragraph [ref=e107]: 1. Help her draft clear HOA updates, announcements, and board communication without staring at a blank page.
            - paragraph [ref=e108]: 2. Show her how reliably AI can review changing local laws and redline legal agreements.
            - paragraph [ref=e109]: 3. Assist her to communicate better with her doctor about an ailment that has been bugging her for a year, but they can't seem to nail down the issue.
            - paragraph [ref=e110]: The real win is not becoming technical. It is feeling more capable, less intimidated, and more free to spend her energy where she actually wants it to go.
