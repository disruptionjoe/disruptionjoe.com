            - paragraph [ref=e74]: Priya runs her own events and weddings business. She is also a busy mother, and right now she is helping coordinate her sister's wedding in India. She already uses AI regularly, so this is not about showing her the basics. It is about helping her get past surface-level use and make it genuinely useful in a season where both work and life are unusually full.
            - paragraph [ref=e75]: She can feel that there is more value here, but getting from "this helps me ideate and proofread emails" to "this actually saves me time" takes experimentation she does not have room for. What she needs is a few smart setups that take meaningful work off her plate right away.
            - heading "What unlock looks like for Priya" [level=4] [ref=e76]
            - paragraph [ref=e77]: 1. Pull scattered inspiration photos and style notes into clear event concepts she can react to fast.
            - paragraph [ref=e78]: 2. Automate intake of the bride's budget and priorities into a first draft plan with real tradeoffs.
            - paragraph [ref=e79]: 3. Build live vendor comparison sheets that catch gaps, differences, and follow-ups.
            - paragraph [ref=e80]: The real win is having less to hold in her head and opening up more room for the people that matter in her life.
