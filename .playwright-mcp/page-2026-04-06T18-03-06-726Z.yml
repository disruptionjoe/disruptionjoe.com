      - generic [ref=e47]: What Unlock Feels Like
      - heading "Real people. Real friction. Real use." [level=2] [ref=e48]
      - paragraph [ref=e49]: For most people, the real value is not in becoming an expert. It's about understanding privacy issues and tool constraints. It's about less time lost to trial and error. It's about gaining clarity in how AI can help you in your everyday life.
      - generic [ref=e50]:
