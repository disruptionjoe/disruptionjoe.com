            - img "Bob, small business owner" [ref=e54]
            - generic [ref=e55]:
              - heading "Bob" [level=3] [ref=e56]
              - generic [ref=e57]: Small business owner. Husband. Dad. Constantly in motion.
            - generic [ref=e58]: +
          - generic:
            - paragraph [ref=e59]: Bob has a plumbing company with eight employees. The work is hard, the days are full, and the administrative side of the business never really stops. Even when the day is over, it does not always feel over.
            - paragraph [ref=e60]: What drains Bob is not the work. It is the constant mental load of trying to keep everything organized and not let anything slip. Hiring help sounds nice, but it is expensive, hard to trust, and not always realistic for a business his size. He might as well do it himself.
            - heading "What unlock looks like for Bob" [level=4] [ref=e61]
            - paragraph [ref=e62]: 1. We set up one simple place for Bob to drop photos, invoices, notes, and job details from his phone or computer, without having to think about where they go.
            - paragraph [ref=e63]: 2. We make it faster to turn messy information into usable information, so customer history, worksite details, and follow-ups are easier to find when he needs them.
            - paragraph [ref=e64]: 3. We identify a few repeat tasks that waste time every week and build simple automations that take them off his plate.
            - paragraph [ref=e65]: The real win is not just saving time. It is having enough breathing room to be more present at home and finally say yes to being assistant coach for his son Hunter's basketball team.
        - generic [ref=e66]:
